name: Bug Report
description: Report a bug or unexpected behavior in GymPlatform
title: '[BUG] '
labels: ['bug', 'triage']

body:
  - type: markdown
    attributes:
      value: |
        ## Bug Report

        Thank you for reporting a bug! Please fill out the information below.

  - type: input
    id: summary
    attributes:
      label: Bug Summary
      description: Brief description of the issue
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens?
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Affected Module
      options:
        - Membership
        - Training
        - Communication
        - Financial
        - API Layer
        - Infrastructure
        - Other
    validations:
      required: true

  - type: input
    id: dotnet_version
    attributes:
      label: .NET SDK Version

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission
      options:
        - label: I searched existing issues
        - label: I read the contributing guidelines
