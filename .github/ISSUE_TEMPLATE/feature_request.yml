name: Feature Request
description: Suggest a new feature or improvement
title: '[FEAT] '
labels: ['enhancement', 'triage']

body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request

        Thank you for suggesting a feature! Please describe your idea.

  - type: textarea
    id: summary
    attributes:
      label: Feature Summary
      description: Brief description of the feature
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work?
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Affected Module
      options:
        - Membership
        - Training
        - Communication
        - Financial
        - API Layer
        - Frontend
        - Other
    validations:
      required: true
